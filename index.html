<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantasma - Hand Tracker</title>
    <link rel="stylesheet" href="src/style.css">
    <script type="importmap">
    {
        "imports": {
            "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs"
        }
    }
    </script>
</head>

<body>
    <div id="controls">
        <label class="toggle">
            <input type="checkbox" id="showLines" checked>
            <span class="slider"></span>
            <span class="label">Lines</span>
        </label>
        <label class="toggle">
            <input type="checkbox" id="showDots" checked>
            <span class="slider"></span>
            <span class="label">Dots</span>
        </label>
        <label class="toggle">
            <input type="checkbox" id="faceRecognition">
            <span class="slider"></span>
            <span class="label">Face Recognition</span>
        </label>
        <button id="warpMode" class="mode-button" type="button" aria-pressed="false">Palm Warp</button>
        <button id="cubeMode" class="mode-button cube-button" type="button" aria-pressed="false">Glass Cube</button>
        <button id="facePixelateMode" class="mode-button face-button" type="button" aria-pressed="false">Hand Pixelate</button>
    </div>

    <div id="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>
    <script src="src/main.js" type="module"></script>
</body>

</html>
