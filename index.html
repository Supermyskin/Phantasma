<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantasma - Hand Tracker</title>
    <link rel="stylesheet" href="src/style.css">
    <script type="importmap">
    {
        "imports": {
            "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs"
        }
    }
    </script>
</head>

<body>
    <div class="app-shell">

        <main class="dashboard">

            <aside class="sidebar">
                <div id="controls">
                    <label class="toggle">
                        <input type="checkbox" id="showLines" checked>
                        <span class="slider"></span>
                        <span class="label">Lines</span>
                    </label>

                    <label class="toggle">
                        <input type="checkbox" id="showDots" checked>
                        <span class="slider"></span>
                        <span class="label">Dots</span>
                    </label>

                    <label class="toggle">
                        <input type="checkbox" id="showDebug" checked>
                        <span class="slider"></span>
                        <span class="label">Debug Info</span>
                    </label>

                    <label class="toggle">
                        <input type="checkbox" id="faceRecognition" checked>
                        <span class="slider"></span>
                        <span class="label">Face Recognition</span>
                    </label>
                </div>
            </aside>

            <section class="camera-panel">
                <div id="container">
                    <video id="webcam" autoplay playsinline></video>
                    <canvas id="canvas"></canvas>
                </div>
            </section>
        </main>

        <footer class="bottom-panel">
            <div class="video-node">VIDEO</div>

            <div class="mode-links">
                <button id="warpMode" class="mode-button warp-button">Palm Warp</button>
                <button id="cubeMode" class="mode-button cube-button">Glass Cube</button>
                <button id="facePixelateMode" class="mode-button face-button">Hand Pixelate</button>
            </div>
        </footer>

    </div>

    <script src="src/main.js" type="module"></script>
</body>

</html>
